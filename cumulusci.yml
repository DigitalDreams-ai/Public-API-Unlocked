minimum_cumulusci_version: "3.78.0"
project:
    name: Public-API-Unlocked
    package:
        name: PublicApiUnlocked
        name_managed: Public-API-Unlocked
        api_version: "61.0"
    #     - version_id: 04t8b000001ZxNVAA0 # FlowActionsBasePack Version: 3.18
    #     - version_id: 04t5G000004fz7mQAA # FlowScreenComponentsBasePack Version: 3.3.4
    #     - version_id: 04t5G0000043xu3QAA # https://unofficialsf.com/from-josh-dayment-improved-file-upload-in-flow-screens/
    git:
        default_branch: "main"
        prefix_feature: "feature/"
        prefix_beta: "beta/"
        prefix_release: "release/"
    source_format: sfdx
    dependencies:
    - package_name: Litify
      version_id: "04tHs000000w1CEIAY"

tasks:
    delete_existing_beta_release:
        class_path: cumulusci.tasks.command.Command
        options:
            command: python scripts/delete_existing_github_release.py --version "$BETA_VERSION" --tag-prefix "$BETA_TAG_PREFIX"

    robot:
        options:
            suites: robot/Public-API-Unlocked/tests
            options:
                outputdir: robot/Public-API-Unlocked/results

    robot_testdoc:
        options:
            path: robot/Public-API-Unlocked/tests
            output: robot/Public-API-Unlocked/doc/Public-API-Unlocked_tests.html

    run_tests:
        options:
            test_suite_names: PublicApiUnlocked
            required_org_code_coverage_percent: 75

    assign_permission_set_groups:
        class_path: cumulusci.tasks.salesforce.users.permsets.AssignPermissionSetGroups
        options:
            api_names: PublicApiUnlockedAdmin
            # Note: scripts/setup_new_project.py will permanently replace PublicApiUnlocked 
            # with the package name (e.g., YourProjectName)
            # Transforms are not needed since tokens are replaced permanently

    assign_publicApi_api_guest:
        class_path: cumulusci.tasks.salesforce.users.permsets.AssignPermissionSets
        options:
            api_names: PublicApiIntakeApi_Guest

    set_publicApi_config_org_default:
        class_path: cumulusci.tasks.apex.anon.AnonymousApexTask
        options:
            path: scripts/set_publicApi_config_org_default.apex

    load_managed_beta_sample_data:
        class_path: cumulusci.tasks.apex.anon.AnonymousApexTask
        options:
            path: scripts/load_managed_beta_sample_data.apex

flows:
    release_unlocked_beta:
        steps:
            1.5:
                task: delete_existing_beta_release
                options:
                    env:
                        BETA_VERSION: ^^create_package_version.version_number
                        BETA_TAG_PREFIX: $project_config.project__git__prefix_beta

    config_dev:
        steps:
            3.0:
                task: assign_permission_set_groups
            4.0:
                task: assign_publicApi_api_guest
            5.0:
                task: set_publicApi_config_org_default

    config_qa:
        steps:
            3.0:
                task: assign_permission_set_groups
            4.0:
                task: assign_publicApi_api_guest
            5.0:
                task: set_publicApi_config_org_default

    config_managed:
        steps:
            90:
                task: load_managed_beta_sample_data

