<template>
    <lightning-card title="Request Builder" icon-name="utility:filter">
        <div slot="actions">
            <lightning-button
                variant="brand"
                label="Save"
                onclick={handleSave}
                disabled={isSaveDisabled}>
            </lightning-button>
        </div>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </template>

            <template if:false={isLoading}>
                <div class="slds-box slds-theme_default builder-section slds-m-bottom_medium">
                    <div class="section-heading">Configuration</div>
                    <div class="slds-grid slds-gutters slds-wrap">
                        <div class="slds-col slds-size_1-of-1 slds-large-size_8-of-12">
                            <div class="target-object-picker">
                                <lightning-input
                                    type="text"
                                    label="Target Object"
                                    value={targetObjectSearchValue}
                                    placeholder="Start typing an object API name"
                                    onfocus={handleTargetObjectFocus}
                                    onblur={handleTargetObjectBlur}
                                    onkeyup={handleTargetObjectInput}
                                    onchange={handleTargetObjectInput}>
                                </lightning-input>
                                <template if:true={showObjectSuggestions}>
                                    <div class="suggestions-panel">
                                        <template if:true={hasObjectSuggestions}>
                                            <template for:each={filteredObjectSuggestions} for:item="suggestion">
                                                <button
                                                    key={suggestion.value}
                                                    type="button"
                                                    class="suggestion-item"
                                                    data-value={suggestion.value}
                                                    onclick={handleSelectTargetObject}>
                                                    {suggestion.label}
                                                </button>
                                            </template>
                                        </template>
                                        <template if:false={hasObjectSuggestions}>
                                            <div class="suggestion-empty">
                                                No supported target objects match the current search.
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-large-size_4-of-12">
                            <lightning-input
                                type="checkbox"
                                label="Inbound and Outbound are the same"
                                checked={syncDirections}
                                onchange={handleSyncDirectionsChange}>
                            </lightning-input>
                        </div>
                    </div>
                    <div class="builder-help slds-m-top_small">
                        <div class="builder-help-title">How this works</div>
                        <div class="slds-text-body_small">{payloadHelpText}</div>
                    </div>
                </div>

                <lightning-tabset variant="scoped">
                    <lightning-tab label="Payload">
                        <div class="slds-grid slds-gutters">
                            <div class="slds-col slds-size_7-of-12">
                                <div class="panel-header slds-p-bottom_x-small slds-border_bottom">
                                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                        <div>
                                            <h3 class="slds-text-heading_small">Payload Mappings</h3>
                                            <p class="slds-text-body_small slds-text-color_weak">
                                                The builder controls inbound and outbound payloads. Use object field references like
                                                <code>{valuePlaceholder}</code>.
                                            </p>
                                        </div>
                                        <div>
                                            <lightning-button
                                                label="Restore Default"
                                                onclick={handleLoadDefaultMappings}>
                                            </lightning-button>
                                        </div>
                                    </div>
                                </div>

                                <div class="slds-m-top_small">
                                    <lightning-tabset variant="scoped">
                                        <lightning-tab label="Inbound" value="inbound" onactive={handlePayloadTabActive}>
                                                <div class="slds-box slds-theme_default builder-section">
                                                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_small">
                                                        <div>
                                                            <div class="section-heading">Inbound Mappings</div>
                                                            <div class="slds-text-body_small slds-text-color_weak">
                                                                Incoming payload keys map into fields on the selected target object.
                                                            </div>
                                                        </div>
                                                        <div class="slds-grid slds-grid_vertical-align-center slds-gutters_xx-small">
                                                            <lightning-button
                                                                label="Clear"
                                                                onclick={handleClearInboundMappings}>
                                                            </lightning-button>
                                                            <lightning-button-icon
                                                                icon-name="utility:add"
                                                                alternative-text="Add inbound mapping"
                                                                title="Add inbound mapping"
                                                                onclick={handleAddInboundMappingRow}>
                                                            </lightning-button-icon>
                                                        </div>
                                                    </div>
                                                    <div class="mapping-grid">
                                                        <template if:true={hasInboundMappingRows}>
                                                            <template for:each={inboundMappingRows} for:item="row">
                                                                <div key={row.id} class="mapping-row">
                                                                    <div class="slds-grid slds-gutters_x-small">
                                                                        <div class="slds-col slds-size_5-of-12">
                                                                            <lightning-input
                                                                                data-role="mapping-external-key"
                                                                                data-scope="inbound"
                                                                                data-id={row.id}
                                                                                type="text"
                                                                                label="Incoming Key"
                                                                                value={row.externalKey}
                                                                                onchange={handleMappingExternalKeyChange}>
                                                                            </lightning-input>
                                                                        </div>
                                                                        <div class="slds-col slds-size_6-of-12">
                                                                            <lightning-input
                                                                                data-role="mapping-value"
                                                                                data-scope="inbound"
                                                                                data-id={row.id}
                                                                                type="text"
                                                                                label="Value"
                                                                                placeholder={valuePlaceholder}
                                                                                value={row.value}
                                                                                onfocus={handleMappingValueFocus}
                                                                                onblur={handleMappingValueBlur}
                                                                                onkeyup={handleMappingValueInput}
                                                                                onchange={handleMappingValueInput}>
                                                                            </lightning-input>
                                                                            <template if:true={row.showSuggestions}>
                                                                                <div class="suggestions-panel">
                                                                                    <template if:true={row.hasSuggestions}>
                                                                                        <template for:each={row.suggestions} for:item="suggestion">
                                                                                            <button
                                                                                                key={suggestion.value}
                                                                                                type="button"
                                                                                                class="suggestion-item"
                                                                                                data-scope="inbound"
                                                                                                data-row-id={row.id}
                                                                                                data-value={suggestion.value}
                                                                                                onclick={handleSelectMappingSuggestion}>
                                                                                                {suggestion.label}
                                                                                            </button>
                                                                                        </template>
                                                                                    </template>
                                                                                    <template if:false={row.hasSuggestions}>
                                                                                        <div class="suggestion-empty">
                                                                                            No matching fields for the selected object.
                                                                                        </div>
                                                                                    </template>
                                                                                </div>
                                                                            </template>
                                                                        </div>
                                                                        <div class="slds-col slds-size_1-of-12 header-row-action">
                                                                            <lightning-button-icon
                                                                                icon-name="utility:delete"
                                                                                alternative-text="Remove inbound mapping"
                                                                                title="Remove inbound mapping"
                                                                                data-scope="inbound"
                                                                                data-id={row.id}
                                                                                onclick={handleRemoveMapping}>
                                                                            </lightning-button-icon>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </template>
                                                        </template>
                                                        <template if:false={hasInboundMappingRows}>
                                                            <div class="builder-empty-state">
                                                                No inbound mappings configured.
                                                            </div>
                                                        </template>
                                                    </div>
                                                </div>
                                        </lightning-tab>
                                        <lightning-tab label="Outbound" value="outbound" onactive={handlePayloadTabActive}>
                                                <div class="slds-box slds-theme_default builder-section">
                                                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_small">
                                                        <div>
                                                            <div class="section-heading">Outbound Mappings</div>
                                                            <div class="slds-text-body_small slds-text-color_weak">
                                                                Outgoing payload keys map from fields on the selected target object.
                                                            </div>
                                                        </div>
                                                        <div class="slds-grid slds-grid_vertical-align-center slds-gutters_xx-small">
                                                            <lightning-button
                                                                label="Clear"
                                                                onclick={handleClearOutboundMappings}>
                                                            </lightning-button>
                                                            <lightning-button-icon
                                                                icon-name="utility:add"
                                                                alternative-text="Add outbound mapping"
                                                                title="Add outbound mapping"
                                                                onclick={handleAddOutboundMappingRow}>
                                                            </lightning-button-icon>
                                                        </div>
                                                    </div>
                                                    <template if:true={hasOutboundMappingRows}>
                                                        <div class="mapping-grid">
                                                            <template for:each={outboundMappingRows} for:item="row">
                                                                <div key={row.id} class="mapping-row">
                                                                    <div class="slds-grid slds-gutters_x-small">
                                                                        <div class="slds-col slds-size_5-of-12">
                                                                            <lightning-input
                                                                                data-role="mapping-external-key"
                                                                                data-scope="outbound"
                                                                                data-id={row.id}
                                                                                type="text"
                                                                                label="Outgoing Key"
                                                                                value={row.externalKey}
                                                                                onchange={handleMappingExternalKeyChange}>
                                                                            </lightning-input>
                                                                        </div>
                                                                        <div class="slds-col slds-size_6-of-12">
                                                                            <lightning-input
                                                                                data-role="mapping-value"
                                                                                data-scope="outbound"
                                                                                data-id={row.id}
                                                                                type="text"
                                                                                label="Value"
                                                                                placeholder={valuePlaceholder}
                                                                                value={row.value}
                                                                                onfocus={handleMappingValueFocus}
                                                                                onblur={handleMappingValueBlur}
                                                                                onkeyup={handleMappingValueInput}
                                                                                onchange={handleMappingValueInput}>
                                                                            </lightning-input>
                                                                            <template if:true={row.showSuggestions}>
                                                                                <div class="suggestions-panel">
                                                                                    <template if:true={row.hasSuggestions}>
                                                                                        <template for:each={row.suggestions} for:item="suggestion">
                                                                                            <button
                                                                                                key={suggestion.value}
                                                                                                type="button"
                                                                                                class="suggestion-item"
                                                                                                data-scope="outbound"
                                                                                                data-row-id={row.id}
                                                                                                data-value={suggestion.value}
                                                                                                onclick={handleSelectMappingSuggestion}>
                                                                                                {suggestion.label}
                                                                                            </button>
                                                                                        </template>
                                                                                    </template>
                                                                                    <template if:false={row.hasSuggestions}>
                                                                                        <div class="suggestion-empty">
                                                                                            No matching fields for the selected object.
                                                                                        </div>
                                                                                    </template>
                                                                                </div>
                                                                            </template>
                                                                        </div>
                                                                        <div class="slds-col slds-size_1-of-12 header-row-action">
                                                                            <lightning-button-icon
                                                                                icon-name="utility:delete"
                                                                                alternative-text="Remove outbound mapping"
                                                                                title="Remove outbound mapping"
                                                                                data-scope="outbound"
                                                                                data-id={row.id}
                                                                                onclick={handleRemoveMapping}>
                                                                            </lightning-button-icon>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </template>
                                                    <template if:false={hasOutboundMappingRows}>
                                                        <div class="builder-empty-state">
                                                            No outbound mappings configured.
                                                        </div>
                                                    </template>
                                                </div>
                                        </lightning-tab>
                                    </lightning-tabset>
                                </div>
                            </div>

                            <div class="slds-col slds-size_5-of-12">
                                <div class="panel-header slds-p-bottom_x-small slds-border_bottom">
                                    <h3 class="slds-text-heading_small">{payloadPreviewTitle}</h3>
                                </div>
                                <div class="preview-panel slds-p-top_x-small">
                                    <c-public-api-pretty-json json-string={mappingPreviewJson}></c-public-api-pretty-json>
                                </div>
                            </div>
                        </div>
                    </lightning-tab>
                    <lightning-tab label="Related Records">
                        <div class="slds-grid slds-gutters">
                            <div class="slds-col slds-size_7-of-12">
                                <div class="panel-header slds-p-bottom_x-small slds-border_bottom">
                                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                        <div>
                                            <h3 class="slds-text-heading_small">Related Record Resolution</h3>
                                            <p class="slds-text-body_small slds-text-color_weak">
                                                Resolve parent lookups declaratively before the target record is inserted.
                                            </p>
                                        </div>
                                        <lightning-button-icon
                                            icon-name="utility:add"
                                            alternative-text="Add related record rule"
                                            title="Add related record rule"
                                            onclick={handleAddRelatedRule}>
                                        </lightning-button-icon>
                                    </div>
                                </div>

                                <div class="slds-m-top_small related-rule-grid">
                                    <template if:true={hasRelatedRecordRows}>
                                        <template for:each={relatedRecordRows} for:item="row">
                                            <div key={row.id} class="slds-box slds-theme_default builder-section related-rule-card">
                                                <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_small">
                                                    <div class="section-heading">Related Record Rule</div>
                                                    <lightning-button-icon
                                                        icon-name="utility:delete"
                                                        alternative-text="Remove related record rule"
                                                        title="Remove related record rule"
                                                        data-id={row.id}
                                                        onclick={handleRemoveRelatedRule}>
                                                    </lightning-button-icon>
                                                </div>
                                                <div class="slds-grid slds-gutters slds-wrap">
                                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                                        <div class="target-object-picker">
                                                            <lightning-input
                                                                data-role="related-lookup-field"
                                                                data-id={row.id}
                                                                type="text"
                                                                label="Target Lookup Field"
                                                                value={row.targetLookupField}
                                                                placeholder="Start typing a lookup field"
                                                                onfocus={handleRelatedLookupFieldFocus}
                                                                onblur={handleRelatedLookupFieldBlur}
                                                                onkeyup={handleRelatedLookupFieldInput}
                                                                onchange={handleRelatedLookupFieldInput}>
                                                            </lightning-input>
                                                            <template if:true={row.showLookupFieldSuggestions}>
                                                                <div class="suggestions-panel">
                                                                    <template if:true={row.hasLookupFieldSuggestions}>
                                                                        <template for:each={row.lookupFieldSuggestions} for:item="suggestion">
                                                                            <button
                                                                                key={suggestion.value}
                                                                                type="button"
                                                                                class="suggestion-item"
                                                                                data-row-id={row.id}
                                                                                data-value={suggestion.value}
                                                                                onclick={handleSelectRelatedLookupFieldSuggestion}>
                                                                                {suggestion.label}
                                                                            </button>
                                                                        </template>
                                                                    </template>
                                                                    <template if:false={row.hasLookupFieldSuggestions}>
                                                                        <div class="suggestion-empty">No supported lookup fields match the current search.</div>
                                                                    </template>
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </div>
                                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                                        <div class="target-object-picker">
                                                            <lightning-input
                                                                data-role="related-object"
                                                                data-id={row.id}
                                                                type="text"
                                                                label="Related Object"
                                                                value={row.relatedObjectSearchValue}
                                                                placeholder="Start typing a related object"
                                                                onfocus={handleRelatedObjectFocus}
                                                                onblur={handleRelatedObjectBlur}
                                                                onkeyup={handleRelatedObjectInput}
                                                                onchange={handleRelatedObjectInput}>
                                                            </lightning-input>
                                                            <template if:true={row.showRelatedObjectSuggestions}>
                                                                <div class="suggestions-panel">
                                                                    <template if:true={row.hasRelatedObjectSuggestions}>
                                                                        <template for:each={row.relatedObjectSuggestions} for:item="suggestion">
                                                                            <button
                                                                                key={suggestion.value}
                                                                                type="button"
                                                                                class="suggestion-item"
                                                                                data-row-id={row.id}
                                                                                data-value={suggestion.value}
                                                                                onclick={handleSelectRelatedObjectSuggestion}>
                                                                                {suggestion.label}
                                                                            </button>
                                                                        </template>
                                                                    </template>
                                                                    <template if:false={row.hasRelatedObjectSuggestions}>
                                                                        <div class="suggestion-empty">No related objects are available for the selected lookup field.</div>
                                                                    </template>
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </div>
                                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                                        <div class="target-object-picker">
                                                            <lightning-input
                                                                data-role="related-match-field"
                                                                data-id={row.id}
                                                                type="text"
                                                                label="Match Field Name"
                                                                value={row.matchFieldName}
                                                                placeholder="Start typing a related field"
                                                                onfocus={handleRelatedMatchFieldFocus}
                                                                onblur={handleRelatedMatchFieldBlur}
                                                                onkeyup={handleRelatedMatchFieldInput}
                                                                onchange={handleRelatedMatchFieldInput}>
                                                            </lightning-input>
                                                            <template if:true={row.showMatchFieldSuggestions}>
                                                                <div class="suggestions-panel">
                                                                    <template if:true={row.hasMatchFieldSuggestions}>
                                                                        <template for:each={row.matchFieldSuggestions} for:item="suggestion">
                                                                            <button
                                                                                key={suggestion.value}
                                                                                type="button"
                                                                                class="suggestion-item"
                                                                                data-row-id={row.id}
                                                                                data-value={suggestion.value}
                                                                                onclick={handleSelectRelatedMatchFieldSuggestion}>
                                                                                {suggestion.label}
                                                                            </button>
                                                                        </template>
                                                                    </template>
                                                                    <template if:false={row.hasMatchFieldSuggestions}>
                                                                        <div class="suggestion-empty">No queryable match fields are available for the selected related object.</div>
                                                                    </template>
                                                                </div>
                                                            </template>
                                                        </div>
                                                    </div>
                                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                                        <lightning-input
                                                            data-role="related-source-key"
                                                            data-id={row.id}
                                                            type="text"
                                                            label="Source Key"
                                                            value={row.sourceKey}
                                                            placeholder="email or data.email"
                                                            onchange={handleRelatedSourceKeyChange}>
                                                        </lightning-input>
                                                    </div>
                                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                                        <lightning-input
                                                            type="checkbox"
                                                            data-id={row.id}
                                                            label="Create if missing"
                                                            checked={row.createIfMissing}
                                                            onchange={handleRelatedCreateIfMissingChange}>
                                                        </lightning-input>
                                                    </div>
                                                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                                        <lightning-combobox
                                                            data-id={row.id}
                                                            label="If Multiple Matches"
                                                            value={row.onMultipleMatches}
                                                            options={multiMatchPolicyOptions}
                                                            onchange={handleRelatedMultiMatchPolicyChange}>
                                                        </lightning-combobox>
                                                    </div>
                                                </div>
                                                <template if:true={row.createIfMissing}>
                                                    <div class="slds-m-top_medium slds-border_top slds-p-top_medium">
                                                        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_small">
                                                            <div>
                                                                <div class="section-heading">Create Mappings</div>
                                                                <div class="slds-text-body_small slds-text-color_weak">
                                                                    These fields are populated only when a new related record is created.
                                                                </div>
                                                            </div>
                                                            <lightning-button-icon
                                                                icon-name="utility:add"
                                                                alternative-text="Add create mapping"
                                                                title="Add create mapping"
                                                                data-id={row.id}
                                                                onclick={handleAddRelatedCreateMapping}>
                                                            </lightning-button-icon>
                                                        </div>
                                                        <template if:true={row.hasCreateMappings}>
                                                            <template for:each={row.createMappings} for:item="mapping">
                                                                <div key={mapping.id} class="slds-grid slds-gutters_x-small slds-m-bottom_x-small header-row">
                                                                    <div class="slds-col slds-size_5-of-12">
                                                                        <lightning-input
                                                                            data-role="related-create-source-key"
                                                                            data-row-id={row.id}
                                                                            data-id={mapping.id}
                                                                            type="text"
                                                                            label="Source Key"
                                                                            placeholder="phone or data.phone"
                                                                            value={mapping.sourceKey}
                                                                            onchange={handleRelatedCreateSourceKeyChange}>
                                                                        </lightning-input>
                                                                    </div>
                                                                    <div class="slds-col slds-size_6-of-12">
                                                                        <div class="target-object-picker">
                                                                            <lightning-input
                                                                                data-role="related-create-field"
                                                                                data-row-id={row.id}
                                                                                data-id={mapping.id}
                                                                                type="text"
                                                                                label="Field Name"
                                                                                placeholder="Start typing a related object field"
                                                                                value={mapping.fieldName}
                                                                                onfocus={handleRelatedCreateFieldFocus}
                                                                                onblur={handleRelatedCreateFieldBlur}
                                                                                onkeyup={handleRelatedCreateFieldInput}
                                                                                onchange={handleRelatedCreateFieldInput}>
                                                                            </lightning-input>
                                                                            <template if:true={mapping.showFieldSuggestions}>
                                                                                <div class="suggestions-panel">
                                                                                    <template if:true={mapping.hasFieldSuggestions}>
                                                                                        <template for:each={mapping.fieldSuggestions} for:item="suggestion">
                                                                                            <button
                                                                                                key={suggestion.value}
                                                                                                type="button"
                                                                                                class="suggestion-item"
                                                                                                data-row-id={row.id}
                                                                                                data-mapping-id={mapping.id}
                                                                                                data-value={suggestion.value}
                                                                                                onclick={handleSelectRelatedCreateFieldSuggestion}>
                                                                                                {suggestion.label}
                                                                                            </button>
                                                                                        </template>
                                                                                    </template>
                                                                                    <template if:false={mapping.hasFieldSuggestions}>
                                                                                        <div class="suggestion-empty">No writable create fields are available for the selected related object.</div>
                                                                                    </template>
                                                                                </div>
                                                                            </template>
                                                                        </div>
                                                                    </div>
                                                                    <div class="slds-col slds-size_1-of-12 header-row-action">
                                                                        <lightning-button-icon
                                                                            icon-name="utility:delete"
                                                                            alternative-text="Remove create mapping"
                                                                            title="Remove create mapping"
                                                                            data-row-id={row.id}
                                                                            data-id={mapping.id}
                                                                            onclick={handleRemoveRelatedCreateMapping}>
                                                                        </lightning-button-icon>
                                                                    </div>
                                                                </div>
                                                            </template>
                                                        </template>
                                                        <template if:false={row.hasCreateMappings}>
                                                            <div class="builder-empty-state">
                                                                No create mappings configured.
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </template>
                                    <template if:false={hasRelatedRecordRows}>
                                        <div class="builder-empty-state">No related record rules configured.</div>
                                    </template>
                                </div>
                            </div>
                            <div class="slds-col slds-size_5-of-12">
                                <div class="panel-header slds-p-bottom_x-small slds-border_bottom">
                                    <h3 class="slds-text-heading_small">Related Records Preview</h3>
                                </div>
                                <div class="preview-panel slds-p-top_x-small">
                                    <c-public-api-pretty-json json-string={relatedRecordsPreviewJson}></c-public-api-pretty-json>
                                </div>
                            </div>
                        </div>
                    </lightning-tab>
                    <lightning-tab label="Triggers">
                        <div class="slds-grid slds-gutters">
                            <div class="slds-col slds-size_7-of-12">
                                <div class="panel-header slds-p-bottom_x-small slds-border_bottom">
                                    <h3 class="slds-text-heading_small">Outbound Trigger Settings</h3>
                                </div>
                                <div class="slds-box slds-theme_default slds-m-top_small builder-section">
                                    <div class="slds-grid slds-gutters slds-wrap">
                                        <div class="slds-col slds-size_1-of-1">
                                            <lightning-input
                                                type="checkbox"
                                                label="Outbound Trigger Enabled"
                                                checked={outboundTriggerEnabled}
                                                onchange={handleOutboundTriggerEnabledChange}>
                                            </lightning-input>
                                        </div>
                                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                            <div class="target-object-picker">
                                                <lightning-input
                                                    data-role="trigger-field-name"
                                                    type="text"
                                                    label="Outbound Trigger Field Name"
                                                    value={outboundTriggerFieldName}
                                                    placeholder="Start typing a field API name"
                                                    onfocus={handleTriggerFieldFocus}
                                                    onblur={handleTriggerFieldBlur}
                                                    onkeyup={handleTriggerFieldInput}
                                                    onchange={handleTriggerFieldInput}>
                                                </lightning-input>
                                                <template if:true={showTriggerFieldSuggestions}>
                                                    <div class="suggestions-panel">
                                                        <template if:true={hasTriggerFieldSuggestions}>
                                                            <template for:each={filteredTriggerFieldSuggestions} for:item="suggestion">
                                                                <button
                                                                    key={suggestion.value}
                                                                    type="button"
                                                                    class="suggestion-item"
                                                                    data-value={suggestion.value}
                                                                    onclick={handleSelectTriggerFieldSuggestion}>
                                                                    {suggestion.label}
                                                                </button>
                                                            </template>
                                                        </template>
                                                        <template if:false={hasTriggerFieldSuggestions}>
                                                            <div class="suggestion-empty">No supported trigger fields match the current search.</div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                            <div class="target-object-picker">
                                                <lightning-input
                                                    data-role="trigger-field-values"
                                                    type="text"
                                                    label="Outbound Trigger Field Values"
                                                    value={outboundTriggerFieldValues}
                                                    placeholder="Comma-separate values or pick from suggestions"
                                                    onfocus={handleTriggerValuesFocus}
                                                    onblur={handleTriggerValuesBlur}
                                                    onkeyup={handleTriggerValuesInput}
                                                    onchange={handleTriggerValuesInput}>
                                                </lightning-input>
                                                <template if:true={showTriggerValueSuggestions}>
                                                    <div class="suggestions-panel">
                                                        <template if:true={hasTriggerValueSuggestions}>
                                                            <template for:each={filteredTriggerValueSuggestions} for:item="suggestion">
                                                                <button
                                                                    key={suggestion.value}
                                                                    type="button"
                                                                    class="suggestion-item"
                                                                    data-value={suggestion.value}
                                                                    onclick={handleSelectTriggerValueSuggestion}>
                                                                    {suggestion.label}
                                                                </button>
                                                            </template>
                                                        </template>
                                                        <template if:false={hasTriggerValueSuggestions}>
                                                            <div class="suggestion-empty">No suggested values are available for the selected field.</div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="slds-col slds-size_5-of-12">
                                <div class="panel-header slds-p-bottom_x-small slds-border_bottom">
                                    <h3 class="slds-text-heading_small">Triggers Preview</h3>
                                </div>
                                <div class="preview-panel slds-p-top_x-small">
                                    <c-public-api-pretty-json json-string={triggersPreviewJson}></c-public-api-pretty-json>
                                </div>
                            </div>
                        </div>
                    </lightning-tab>
                    <lightning-tab label="Headers">
                        <div class="slds-grid slds-gutters">
                            <div class="slds-col slds-size_7-of-12">
                                <div class="panel-header slds-p-bottom_x-small slds-border_bottom">
                                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                        <div>
                                            <h3 class="slds-text-heading_small">Headers</h3>
                                            <p class="slds-text-body_small slds-text-color_weak">
                                                Configure the full outbound header set here: auth first, then any extra custom headers.
                                            </p>
                                        </div>
                                    </div>
                                </div>

                                <div class="slds-box slds-theme_default slds-m-top_small builder-section">
                                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_small">
                                        <div>
                                            <div class="section-heading">Webhook Domain Provisioning</div>
                                            <div class="slds-text-body_small slds-text-color_weak">
                                                Provision the outbound webhook domain explicitly after changing the webhook URL.
                                            </div>
                                        </div>
                                        <lightning-button
                                            label="Provision Webhook Domain"
                                            onclick={handleProvisionWebhookDomain}>
                                        </lightning-button>
                                    </div>
                                    <div class="slds-grid slds-gutters slds-wrap">
                                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                            <lightning-badge label={remoteSiteStatusLabel} class={remoteSiteStatusVariant}></lightning-badge>
                                            <div class="slds-text-body_small slds-m-top_x-small">
                                                <strong>Domain:</strong> {outboundRemoteSiteDomain}
                                            </div>
                                            <div class="slds-text-body_small">
                                                <strong>Remote Site Name:</strong> {outboundRemoteSiteName}
                                            </div>
                                        </div>
                                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                            <div class="slds-text-body_small">
                                                <strong>Last Provisioned:</strong> {outboundRemoteSiteLastProvisionedAt}
                                            </div>
                                            <template if:true={outboundRemoteSiteLastError}>
                                                <div class="slds-text-color_error slds-text-body_small slds-m-top_x-small">
                                                    <strong>Last Error:</strong> {outboundRemoteSiteLastError}
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>

                                <div class="slds-box slds-theme_default slds-m-top_small builder-section">
                                    <div class="section-heading">Authentication</div>
                                    <div class="slds-grid slds-gutters slds-wrap">
                                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                            <lightning-combobox
                                                label="Outbound Auth Mode"
                                                value={authMode}
                                                options={authModeOptions}
                                                onchange={handleAuthModeChange}>
                                            </lightning-combobox>
                                        </div>
                                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                            <lightning-input
                                                type="text"
                                                label="Outbound Content Type"
                                                value={contentType}
                                                onchange={handleContentTypeChange}>
                                            </lightning-input>
                                        </div>
                                    </div>
                                    <div class="builder-help slds-m-top_small">
                                        <div class="builder-help-title">{primaryHeaderSectionTitle}</div>
                                        <div class="slds-text-body_small">{primaryHeaderSectionBody}</div>
                                    </div>
                                </div>

                                <div class="slds-box slds-theme_default slds-m-top_small builder-section">
                                    <div class="section-heading">{primaryHeaderSectionTitle}</div>
                                    <template if:true={showPrimaryHeaderSection}>
                                        <div class="slds-grid slds-gutters slds-wrap">
                                            <template if:true={showPrimaryHeaderNameInput}>
                                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                                    <lightning-input
                                                        type="text"
                                                        label={primaryHeaderNameLabel}
                                                        placeholder={primaryHeaderNamePlaceholder}
                                                        value={headerName}
                                                        onchange={handlePrimaryHeaderNameChange}>
                                                    </lightning-input>
                                                </div>
                                            </template>
                                            <template if:true={showPrimaryHeaderValueInput}>
                                                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                                    <lightning-input
                                                        type="text"
                                                        label={primaryHeaderValueLabel}
                                                        placeholder={primaryHeaderValuePlaceholder}
                                                        value={headerValue}
                                                        onchange={handlePrimaryHeaderValueChange}>
                                                    </lightning-input>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                    <template if:false={showPrimaryHeaderSection}>
                                        <div class="builder-empty-state">
                                            No auth-specific primary header is configured for this mode.
                                        </div>
                                    </template>
                                    <div class="slds-text-body_small slds-m-top_small">
                                        <strong>What will be sent:</strong> {authSummaryLabel}
                                    </div>
                                    <template if:true={isHmacMode}>
                                        <div class="slds-text-body_small slds-m-top_x-small slds-text-color_weak">
                                            HMAC mode uses `Outbound Webhook Secret` to generate the signature value.
                                        </div>
                                    </template>
                                </div>

                                <div class="slds-box slds-theme_default slds-m-top_small builder-section">
                                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_small">
                                        <div>
                                            <div class="section-heading">Additional Headers</div>
                                            <div class="slds-text-body_small slds-text-color_weak">
                                                Use these for non-auth custom headers such as environment, source, or partner-specific keys.
                                            </div>
                                        </div>
                                        <div class="slds-grid slds-grid_vertical-align-center slds-gutters_xx-small">
                                            <lightning-button
                                                label="Clear Additional Headers"
                                                onclick={handleClearHeaders}>
                                            </lightning-button>
                                            <lightning-button-icon
                                                icon-name="utility:add"
                                                alternative-text="Add header"
                                                title="Add header"
                                                onclick={handleAddHeaderRow}>
                                            </lightning-button-icon>
                                        </div>
                                    </div>
                                    <div class="headers-panel">
                                        <template if:true={hasHeaderRows}>
                                            <template for:each={headerRows} for:item="row">
                                                <div key={row.id} class="slds-grid slds-gutters_x-small slds-m-bottom_x-small header-row">
                                                    <div class="slds-col slds-size_5-of-12">
                                                        <lightning-input
                                                            type="text"
                                                            label="Header Name"
                                                            value={row.name}
                                                            data-id={row.id}
                                                            onchange={handleHeaderNameChange}>
                                                        </lightning-input>
                                                    </div>
                                                    <div class="slds-col slds-size_6-of-12">
                                                        <lightning-input
                                                            type="text"
                                                            label="Header Value"
                                                            value={row.value}
                                                            data-id={row.id}
                                                            onchange={handleHeaderValueChange}>
                                                        </lightning-input>
                                                    </div>
                                                    <div class="slds-col slds-size_1-of-12 header-row-action">
                                                        <lightning-button-icon
                                                            icon-name="utility:delete"
                                                            alternative-text="Remove header"
                                                            title="Remove header"
                                                            data-id={row.id}
                                                            onclick={handleRemoveHeader}>
                                                        </lightning-button-icon>
                                                    </div>
                                                </div>
                                            </template>
                                        </template>
                                        <template if:false={hasHeaderRows}>
                                            <div class="builder-empty-state">
                                                No additional headers configured.
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>

                            <div class="slds-col slds-size_5-of-12">
                                <div class="panel-header slds-p-bottom_x-small slds-border_bottom">
                                    <h3 class="slds-text-heading_small">Headers Preview</h3>
                                </div>
                                <div class="preview-panel slds-p-top_x-small">
                                    <c-public-api-pretty-json json-string={headersPreviewJson}></c-public-api-pretty-json>
                                </div>
                            </div>
                        </div>
                    </lightning-tab>
                </lightning-tabset>

                <template if:true={errorMessage}>
                    <div class="slds-notify slds-notify_alert slds-alert_error slds-m-top_small" role="alert">
                        <span class="slds-assistive-text">error</span>
                        <h2>{errorMessage}</h2>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
