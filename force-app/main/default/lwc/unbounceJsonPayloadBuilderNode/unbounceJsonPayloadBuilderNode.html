<template>
    <div class="node-wrapper">
        <div class="slds-grid slds-grid_vertical-align-center slds-p-vertical_xx-small node-row" style={nodeStyle}>
            <template if:true={isObject}>
                <button class="slds-button slds-button_icon toggle-btn" onclick={handleToggleExpand}>
                    <lightning-icon icon-name={expandIcon} size="xx-small" alternative-text="Toggle"></lightning-icon>
                </button>
            </template>
            <template if:false={isObject}>
                <span class="toggle-spacer"></span>
            </template>

            <div class="key-input slds-m-right_xx-small">
                <lightning-input
                    type="text"
                    value={node.key}
                    variant="label-hidden"
                    label="Key"
                    onchange={handleKeyChange}>
                </lightning-input>
            </div>

            <span class="slds-m-horizontal_xx-small colon">:</span>

            <div class="type-input slds-m-right_xx-small">
                <lightning-combobox
                    value={node.type}
                    options={typeOptions}
                    variant="label-hidden"
                    label="Type"
                    onchange={handleTypeChange}>
                </lightning-combobox>
            </div>

            <template if:false={isObject}>
                <div class="value-input slds-m-right_xx-small">
                    <template if:true={isNull}>
                        <span class="null-label slds-text-color_weak">null</span>
                    </template>
                    <template if:false={isNull}>
                        <div class="autocomplete-container">
                            <lightning-input
                                type="text"
                                value={node.sourcePath}
                                variant="label-hidden"
                                label="Value"
                                placeholder="Type $.field or literal value"
                                onchange={handleSourcePathInputChange}
                                onfocus={handleInputFocus}
                                onblur={handleInputBlur}
                                oninput={handleInputFilter}>
                            </lightning-input>
                            <template if:true={showSuggestions}>
                                <div class="suggestions-dropdown slds-dropdown slds-dropdown_left slds-dropdown_length-10" role="listbox">
                                    <ul class="slds-listbox slds-listbox_vertical">
                                        <template for:each={filteredPaths} for:item="suggestion">
                                            <li
                                                key={suggestion.value}
                                                class="slds-listbox__item"
                                                role="option"
                                                onmousedown={handleSuggestionSelect}
                                                data-value={suggestion.value}>
                                                <div class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small suggestion-item">
                                                    <span class="slds-media__body">
                                                        <span class="slds-truncate">{suggestion.label}</span>
                                                    </span>
                                                </div>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

            <div class="node-actions">
                <template if:true={isObject}>
                    <lightning-button-icon
                        icon-name="utility:add"
                        alternative-text="Add child"
                        title="Add child key"
                        size="small"
                        onclick={handleAddChild}>
                    </lightning-button-icon>
                </template>
                <lightning-button-icon
                    icon-name="utility:delete"
                    alternative-text="Remove"
                    title="Remove key"
                    size="small"
                    onclick={handleRemove}>
                </lightning-button-icon>
            </div>
        </div>

        <template if:true={showChildren}>
            <div class="children-container">
                <template for:each={node.children} for:item="child">
                    <c-unbounce-json-payload-builder-node
                        key={child.id}
                        node={child}
                        available-paths={availablePaths}
                        depth={childDepth}
                        onremovenode={handleChildEvent}
                        onupdatenode={handleChildEvent}
                        onaddchild={handleChildEvent}>
                    </c-unbounce-json-payload-builder-node>
                </template>
            </div>
        </template>
    </div>
</template>
